<style>
/* ── Design tokens ─────────────────────────────────────── */
:root {
  --pd-red:        #D92533;
  --pd-red-deep:   #A8141E;
  --pd-red-soft:   #FCE9EA;
  --pd-cream:      #FAF6F1;
  --pd-bone:       #FFFFFF;
  --pd-ink:        #15171C;
  --pd-ink-2:      #3A3F47;
  --pd-ink-3:      #6B7280;
  --pd-ink-4:      #9AA0A8;
  --pd-line:       #E7E2DA;
  --pd-line-2:     #F0EBE3;
  --pd-bg:         #F4EFE8;
  --pd-good:       #1F8A4C;
  --pd-good-soft:  #E5F4EB;
  --pd-warn:       #C77700;
  --pd-warn-soft:  #FBF1DC;
  --pd-bad:        #C81E2C;
  --pd-bad-soft:   #FCE7E9;
  --pd-font-sans:  "Inter", -apple-system, system-ui, sans-serif;
  --pd-font-display: "Instrument Serif", "Times New Roman", serif;
  --pd-font-mono:  "JetBrains Mono", ui-monospace, monospace;
  --pd-r-sm: 8px;
  --pd-r-md: 14px;
  --pd-r-lg: 20px;
  --pd-r-xl: 28px;
  --pd-shadow-card: 0 1px 2px rgba(20,20,30,0.04), 0 4px 16px rgba(20,20,30,0.04);
  --pd-shadow-tablet: 0 30px 80px -20px rgba(80,30,30,0.20), 0 8px 24px rgba(80,30,30,0.08);
}

/* ── Reset / base ──────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: var(--pd-font-sans);
  color: var(--pd-ink);
  background: var(--pd-bg);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
}

/* ── Tablet shell ──────────────────────────────────────── */
.pd-tablet {
  background: var(--pd-cream);
  color: var(--pd-ink);
  border-radius: var(--pd-r-xl);
  box-shadow: var(--pd-shadow-tablet);
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  width: 1180px;
  height: 820px;
  flex-shrink: 0;
}

/* ── Typography ────────────────────────────────────────── */
.pd-display {
  font-family: var(--pd-font-display);
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 1.05;
  color: var(--pd-ink);
}
.pd-eyebrow {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--pd-ink-3);
  font-weight: 600;
}
.pd-mono { font-family: var(--pd-font-mono); }

/* ── Cards ─────────────────────────────────────────────── */
.pd-card {
  background: var(--pd-bone);
  border-radius: var(--pd-r-lg);
  box-shadow: var(--pd-shadow-card);
  border: 1px solid var(--pd-line);
}

/* ── Buttons ───────────────────────────────────────────── */
.pd-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: none;
  border-radius: 999px;
  font-family: inherit;
  font-weight: 600;
  font-size: 15px;
  padding: 14px 22px;
  cursor: pointer;
  transition: transform .12s ease, background .12s ease;
  min-height: 48px;
  color: inherit;
}
.pd-btn:active { transform: scale(0.98); }
.pd-btn--primary { background: var(--pd-red); color: #fff !important; }
.pd-btn--primary:hover { background: var(--pd-red-deep); }
.pd-btn--ghost { background: transparent; color: var(--pd-ink); border: 1.5px solid var(--pd-line); }
.pd-btn--ghost:hover { background: var(--pd-line-2); }

/* ── Pills ─────────────────────────────────────────────── */
.pd-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  background: var(--pd-line-2);
  color: var(--pd-ink-2);
}
.pd-pill--good { background: var(--pd-good-soft); color: var(--pd-good); }
.pd-pill--warn { background: var(--pd-warn-soft); color: var(--pd-warn); }
.pd-pill--bad  { background: var(--pd-bad-soft);  color: var(--pd-bad);  }

/* ── Range slider ──────────────────────────────────────── */
input[type="range"] { -webkit-appearance: none; background: transparent; width: 100%; }
input[type="range"]::-webkit-slider-runnable-track {
  height: 6px; background: var(--pd-line); border-radius: 999px;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 22px; height: 22px; border-radius: 999px;
  background: var(--pd-red); border: 3px solid #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2); margin-top: -8px; cursor: pointer;
}

/* ── Scrollbar ─────────────────────────────────────────── */
.pd-scroll::-webkit-scrollbar { width: 4px; }
.pd-scroll::-webkit-scrollbar-track { background: transparent; }
.pd-scroll::-webkit-scrollbar-thumb { background: var(--pd-line); border-radius: 999px; }

{% raw %}
const { useState, useEffect, useMemo, useRef } = React;

const ACCENT   = "#D92533";
const RED_DEEP = "#A8141E";

const PITCH_TYPES = [
  { code: "FF", name: "4-Seam",   color: "#D92533" },
  { code: "SI", name: "Sinker",   color: "#E07A1F" },
  { code: "FC", name: "Cutter",   color: "#B45309" },
  { code: "SL", name: "Slider",   color: "#7C3AED" },
  { code: "CU", name: "Curve",    color: "#2563EB" },
  { code: "CH", name: "Change",   color: "#0E9488" },
  { code: "FS", name: "Splitter", color: "#0891B2" },
  { code: "SV", name: "Sweeper",  color: "#9333EA" },
];

// Default hidden pitch parameters (matched to existing index.html PITCH_DEFAULTS)
const PITCH_DEFAULTS = {
  FF: { spin: 2300, pfx_x: -0.5, pfx_z:  1.4, rel_x: -1.5, rel_z: 5.9, ext: 6.2 },
  SI: { spin: 2100, pfx_x: -0.9, pfx_z:  0.9, rel_x: -1.5, rel_z: 5.9, ext: 6.2 },
  FC: { spin: 2400, pfx_x: -0.1, pfx_z:  1.1, rel_x: -1.5, rel_z: 5.9, ext: 6.2 },
  SL: { spin: 2500, pfx_x:  0.4, pfx_z:  0.2, rel_x: -1.5, rel_z: 5.9, ext: 6.0 },
  CU: { spin: 2700, pfx_x:  0.2, pfx_z: -0.8, rel_x: -1.5, rel_z: 5.9, ext: 5.8 },
  CH: { spin: 1800, pfx_x: -0.6, pfx_z:  0.6, rel_x: -1.5, rel_z: 5.9, ext: 6.0 },
  FS: { spin: 1600, pfx_x: -0.3, pfx_z:  0.3, rel_x: -1.5, rel_z: 5.9, ext: 6.0 },
  SV: { spin: 2600, pfx_x:  0.7, pfx_z:  0.1, rel_x: -1.5, rel_z: 5.9, ext: 6.0 },
};

// Derive initials from "Last, First" or "First Last" formats
function hitterInitials(name) {
  if (!name) return "??";
  // Handle "Last, First" format
  const commaIdx = name.indexOf(",");
  if (commaIdx !== -1) {
    const last  = name.slice(0, commaIdx).trim();
    const first = name.slice(commaIdx + 1).trim();
    return ((first[0] || "") + (last[0] || "")).toUpperCase();
  }
  const parts = name.trim().split(/\s+/);
  return parts.length >= 2
    ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
    : name.slice(0, 2).toUpperCase();
}

// Display name: "Last, First" → "First Last"
function displayName(name) {
  if (!name) return name;
  const commaIdx = name.indexOf(",");
  if (commaIdx !== -1) {
    const last  = name.slice(0, commaIdx).trim();
    const first = name.slice(commaIdx + 1).trim();
    return first ? `${first} ${last}` : last;
  }
  return name;
}

function ptColor(code) {
  return (PITCH_TYPES.find(p => p.code === code) || {}).color || ACCENT;
}
{% endraw %}

const BATTER_BAT_PATH = "M21.0526316,46.8451531 C28.0671334,42.211283 46.668798,29.2166921 52.9432478,24.633802 C59.2176975,20.0509119 88.4734639,2.06452882 93.4773624,0.279166555 C98.4823638,-1.50513363 101.341104,5.77651045 99.3735143,7.60754232 L59.4151183,30.8151276 C55.002379,33.2271191 36.2661595,42.936686 24.613925,49.3867187 L21.0526316,46.8451531 Z";

function StrikeZone({ size = 320, plateX = 0, plateZ = 2.5, batter = "R", onPick, accent = ACCENT, absZone = null, view = "pitcher" }) {
  const H = size;
  const W = Math.round(size * 1.65);
  // ABS zone if available, otherwise standard rulebook bounds
  const zXMin = absZone ? absZone.left_ft   : -0.708;
  const zXMax = absZone ? absZone.right_ft  :  0.708;
  const zZMin = absZone ? absZone.bottom_ft :  1.5;
  const zZMax = absZone ? absZone.top_ft    :  3.5;
  const CHASE = 0.5;

  // Isotropic coordinate system: pitch space is H×H, centered in the wider W×H canvas.
  // The (W-H)/2 pad on each side is reserved for the batter silhouette margin.
  // This ensures 1 ft horizontal == 1 ft vertical in pixel space so the zone isn't stretched.
  const pad = (W - H) / 2;
  const ftToSvg = (px, pz) => ({
    x: pad + ((px - (-2.0)) / 4.0) * H,
    y: ((1 - (pz - 0.5) / 4.0)) * H,
  });
  const svgToFt = (x, y) => ({
    px: ((x - pad) / H) * 4.0 - 2.0,
    pz: (1 - y / H) * 4.0 + 0.5,
  });

  const zTL = ftToSvg(zXMin, zZMax);
  const zBR = ftToSvg(zXMax, zZMin);
  const cTL = ftToSvg(zXMin - CHASE, zZMax + CHASE);
  const cBR = ftToSvg(zXMax + CHASE, zZMin - CHASE);
  // plateX is always catcher's view; flip for pitcher's view rendering
  const displayX = view === "pitcher" ? -plateX : plateX;
  const marker   = ftToSvg(displayX, plateZ);

  const handleTap = (e) => {
    if (!onPick) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width)  * W;
    const y = ((e.clientY - rect.top)  / rect.height) * H;
    const c = svgToFt(x, y);
    // Single flip at boundary: click coord (display space) → catcher's view
    const catcherPx = view === "pitcher" ? -c.px : c.px;
    onPick(Math.max(-1.7, Math.min(1.7, catcherPx)), Math.max(0.7, Math.min(4.3, c.pz)));
  };

  const s           = size / 220;
  const pathScale   = 200 / 270;
  const ts          = pathScale * s;
  const isLeft      = (batter === "L" || batter === "S");
  const pitcherFlip = isLeft ? -1 : 1;
  const flip        = view === "pitcher" ? pitcherFlip : -pitcherFlip;
  const onRight     = (!isLeft) === (view === "pitcher");
  const batX        = onRight ? Math.round(W - 22 * s) : Math.round(22 * s);
  const batY        = ftToSvg(0, 0.9).y;

  return (
    <svg
      width="100%" viewBox={`0 0 ${W} ${H}`}
      style={{ background: "var(--pd-line-2)", borderRadius: 16, cursor: onPick ? "crosshair" : "default", touchAction: "none" }}
      onClick={handleTap}
    >
      {/* Subtle stitch tint */}
      <defs>
        <pattern id="sz-stitch" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="14" stroke="rgba(217,37,51,0.06)" strokeWidth="3"/>
        </pattern>
      </defs>
      <rect width={W} height={H} fill="url(#sz-stitch)"/>

      {/* Chase border */}
      <rect x={cTL.x} y={cTL.y} width={cBR.x - cTL.x} height={cBR.y - cTL.y}
        fill="none" stroke="var(--pd-line)" strokeWidth="1.5" strokeDasharray="6 6" rx="6"/>

      {/* Strike zone */}
      <rect x={zTL.x} y={zTL.y} width={zBR.x - zTL.x} height={zBR.y - zTL.y}
        fill="rgba(255,255,255,0.55)" stroke="var(--pd-ink)" strokeWidth="2.5" rx="2"/>

      {/* 3×3 grid */}
      {[1, 2].map(i => (
        <g key={i}>
          <line x1={zTL.x + ((zBR.x - zTL.x) / 3) * i} y1={zTL.y}
            x2={zTL.x + ((zBR.x - zTL.x) / 3) * i} y2={zBR.y}
            stroke="var(--pd-ink-4)" strokeOpacity="0.4" strokeWidth="1"/>
          <line x1={zTL.x} y1={zTL.y + ((zBR.y - zTL.y) / 3) * i}
            x2={zBR.x} y2={zTL.y + ((zBR.y - zTL.y) / 3) * i}
            stroke="var(--pd-ink-4)" strokeOpacity="0.4" strokeWidth="1"/>
        </g>
      ))}

      {/* Home plate */}
      {(() => {
        const hp = ftToSvg(0, 0.9);
        const hw = (17 / 12) / 4.0 * H;  // isotropic: H is the square base, same scale as y
        return (
          <polygon
            points={`${hp.x},${hp.y+8} ${hp.x-hw/2},${hp.y} ${hp.x-hw/2},${hp.y-8} ${hp.x+hw/2},${hp.y-8} ${hp.x+hw/2},${hp.y}`}
            fill="rgba(255,255,255,0.9)" stroke="var(--pd-ink-3)" strokeWidth="1.5"
          />
        );
      })()}

      {/* ABS zone label */}
      <text x="6" y="16" fontSize="10" fontFamily="var(--pd-font-mono)" fill="var(--pd-ink-3)">
        {absZone ? (absZone.label || "ABS zone") : "Rulebook zone"}
      </text>

      {/* Detailed batter silhouette (sourced from index.html) */}
      <g transform={`translate(${batX},${batY}) scale(${flip * ts},${ts}) translate(-100,-250)`}
         opacity="0.35" fillRule="nonzero">
        <path d={BATTER_BAT_PATH}  fill="#c9d1d9"/>
        <path d={BATTER_BODY_PATH} fill="#8b949e"/>
      </g>

      {/* Pitch marker */}
      <g style={{ transition: "transform 0.18s ease" }} transform={`translate(${marker.x} ${marker.y})`}>
        <circle r="22" fill={accent} fillOpacity="0.18"/>
        <circle r="13" fill={accent} stroke="#fff" strokeWidth="3"/>
        <circle r="3"  fill="#fff"/>
      </g>
    </svg>
  );
}

<script type="text/babel">

function StageBar({ label, value, color }) {
  const pct = Math.round((value || 0) * 100);
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>

<script type="text/babel">
{% raw %}
function PredictView({ hitter, hitterProfile, deviceConnected, modelVersion = "v2", pitchView = "pitcher", onSetPitchView }) {
  const _d0 = PITCH_DEFAULTS.FF;
  const [pitchType, setPitchType] = useState("FF");
  const [velo,      setVelo]      = useState(94);
  const [plateX,    setPlateX]    = useState(0);
  const [plateZ,    setPlateZ]    = useState(2.5);
  const [balls,     setBalls]     = useState(0);
  const [strikes,   setStrikes]   = useState(0);
  const [loading,   setLoading]   = useState(false);
  const [result,    setResult]    = useState(null);
  const [error,     setError]     = useState(null);
  const [advOpen,   setAdvOpen]   = useState(false);
  const [spin,      setSpin]      = useState(_d0.spin);
  const [pfxX,      setPfxX]      = useState(_d0.pfx_x);
  const [pfxZ,      setPfxZ]      = useState(_d0.pfx_z);
  const [relX,      setRelX]      = useState(_d0.rel_x);
  const [relZ,      setRelZ]      = useState(_d0.rel_z);
  const [ext,       setExt]       = useState(_d0.ext);

  const changePitchType = (code) => {
    setPitchType(code);
    const d = PITCH_DEFAULTS[code] || PITCH_DEFAULTS.FF;
    setSpin(d.spin); setPfxX(d.pfx_x); setPfxZ(d.pfx_z);
    setRelX(d.rel_x); setRelZ(d.rel_z); setExt(d.ext);
  };

  const batter = hitter?.stand || "R";

  const runPrediction = async () => {
    if (!hitter) return;
    setLoading(true);
    setError(null);
    try {
      const res = await fetch("/api/predict_demo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          hitter_name:   hitter.name,
          model_version: modelVersion,
          pitch: {
            release_speed:     velo,
            plate_x:           plateX,
            plate_z:           plateZ,
            pitch_type:        pitchType,
            balls,
            strikes,
            spin_rate:         spin,
            pfx_x:             pfxX,
            pfx_z:             pfxZ,
            release_pos_x:     relX,
            release_pos_z:     relZ,
            release_extension: ext,
            p_throws:          "R",
            pitch_number:      1,
            on_1b: 0, on_2b: 0, on_3b: 0,
            inning: 1, score_diff: 0, times_through_order: 1,
          },
        }),
      });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      setResult(await res.json());
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  const blend   = result?.blend   || {};
  const verdict = result?.verdict || {};
  const xwoba   = result?.xwoba   || {};
  const stageDriversObj = result?.model?.stage_drivers || {};
  const drivers = Object.entries(stageDriversObj)
    .flatMap(([stage, arr]) => (arr || []).map(d => ({ ...d, stage })))
    .sort((a, b) => b.importance - a.importance)
    .slice(0, 5);
  const danger  = verdict.danger_level || "";
  const dangerLevel = danger.replace(" DANGER", "");
  const dangerColor = dangerLevel === "HIGH" ? "var(--pd-bad)" : dangerLevel === "MODERATE" ? "var(--pd-warn)" : "var(--pd-good)";
  const dangerBg    = dangerLevel === "HIGH" ? "var(--pd-bad-soft)" : dangerLevel === "MODERATE" ? "var(--pd-warn-soft)" : "var(--pd-good-soft)";

  const stepperBtn = {
    width: 32, height: 22, borderRadius: 6, border: "none",
    background: "var(--pd-bone)", color: "var(--pd-ink-2)",
    fontSize: 14, fontWeight: 600, cursor: "pointer",
    display: "flex", alignItems: "center", justifyContent: "center",
    fontFamily: "inherit",
  };

  return (
    <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
      {/* LEFT — inputs */}
      <div className="pd-scroll" style={{
        flex: "0 0 52%", padding: "24px 28px", overflowY: "auto",
        borderRight: "1px solid var(--pd-line)",
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 14 }}>
          <div>
            <span className="pd-eyebrow">Step 1</span>
            <h2 className="pd-display" style={{ fontSize: 28, marginTop: 4 }}>Set the pitch</h2>
          </div>
          {deviceConnected && <span className="pd-pill pd-pill--good">⚡ Auto-fed from Trackman</span>}
        </div>

        {/* Pitch type pills */}
        <div style={{ marginBottom: 18 }}>
          <div className="pd-eyebrow" style={{ marginBottom: 8 }}>Pitch type</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {PITCH_TYPES.map(p => {
              const active = pitchType === p.code;
              return (
                <button key={p.code} onClick={() => changePitchType(p.code)} style={{
                  padding: "10px 16px", borderRadius: 999,
                  border: `1.5px solid ${active ? p.color : "var(--pd-line)"}`,
                  background: active ? p.color : "var(--pd-bone)",
                  color: active ? "#fff" : "var(--pd-ink-2)",
                  fontSize: 13, fontWeight: 600,
                  cursor: "pointer", fontFamily: "inherit",
                  display: "flex", alignItems: "center", gap: 6,
                }}>
                  <span style={{ fontFamily: "var(--pd-font-mono)", fontSize: 11, opacity: 0.7 }}>{p.code}</span>
                  {p.name}
                </button>
              );
            })}
          </div>
        </div>

        {/* Velocity */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
            <span className="pd-eyebrow">Velocity</span>
            <div style={{ display: "flex", alignItems: "baseline", gap: 4 }}>
              <input type="number" min={70} max={104} step={0.5} value={velo}
                onChange={e => setVelo(Math.max(70, Math.min(104, parseFloat(e.target.value) || 70)))}
                style={{ fontFamily: "var(--pd-font-mono)", fontSize: 22, fontWeight: 700,
                  width: 72, border: "1.5px solid var(--pd-line)", borderRadius: 8, padding: "2px 6px",
                  background: "var(--pd-bone)", color: "var(--pd-ink)", textAlign: "right" }}/>
              <span style={{ fontSize: 13, color: "var(--pd-ink-3)" }}>mph</span>
            </div>
          </div>
          <input type="range" min={70} max={104} step={0.5} value={velo}
            onChange={e => setVelo(parseFloat(e.target.value))}
            style={{ accentColor: ACCENT }}/>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "var(--pd-ink-4)", fontFamily: "var(--pd-font-mono)" }}>
            <span>70</span><span>104</span>
          </div>
        </div>

        {/* Count */}
        <div style={{ marginBottom: 20 }}>
          <div className="pd-eyebrow" style={{ marginBottom: 8 }}>Count</div>
          <div style={{ display: "flex", gap: 12 }}>
            {[
              { label: "Balls",   val: balls,   set: setBalls,   max: 3 },
              { label: "Strikes", val: strikes, set: setStrikes, max: 2 },
            ].map(s => (
              <div key={s.label} style={{
                flex: 1, background: "var(--pd-line-2)", borderRadius: 14, padding: 12,
                display: "flex", alignItems: "center", justifyContent: "space-between",
              }}>
                <div>
                  <div style={{ fontSize: 11, color: "var(--pd-ink-3)", fontWeight: 600, letterSpacing: "0.04em" }}>{s.label.toUpperCase()}</div>
                  <div style={{ fontFamily: "var(--pd-font-mono)", fontSize: 28, fontWeight: 700, lineHeight: 1, color: "var(--pd-ink)" }}>{s.val}</div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  <button onClick={() => s.set(Math.min(s.max, s.val + 1))} style={stepperBtn}>+</button>
                  <button onClick={() => s.set(Math.max(0, s.val - 1))} style={stepperBtn}>−</button>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Advanced pitch inputs (collapsible) */}
        <div style={{ marginBottom: 16 }}>
          <button onClick={() => setAdvOpen(o => !o)} style={{
            display: "flex", alignItems: "center", gap: 8, width: "100%",
            background: "none", border: "1px dashed var(--pd-line)", borderRadius: 10,

            <span style={{ fontSize: 16, lineHeight: 1 }}>{advOpen ? "−" : "+"}</span>

          </button>
          {advOpen && (
            <div style={{ marginTop: 10, display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>
              {[
                { label: "Spin Rate (rpm)", val: spin,  set: setSpin,  step: 10  },
                { label: "H-Break pfx_x",  val: pfxX,  set: setPfxX,  step: 0.1 },
                { label: "V-Break pfx_z",  val: pfxZ,  set: setPfxZ,  step: 0.1 },
                { label: "Release X (ft)", val: relX,  set: setRelX,  step: 0.1 },
                { label: "Release Z (ft)", val: relZ,  set: setRelZ,  step: 0.1 },
                { label: "Extension (ft)", val: ext,   set: setExt,   step: 0.1 },
              ].map(f => (
                <div key={f.label}>
                  <div style={{ fontSize: 10, color: "var(--pd-ink-3)", marginBottom: 4 }}>{f.label}</div>
                  <input type="number" value={f.val} step={f.step}
                    onChange={e => f.set(parseFloat(e.target.value) || 0)}
                    style={{
                      width: "100%", padding: "6px 8px", borderRadius: 8,
                      border: "1.5px solid var(--pd-line)", background: "var(--pd-bone)",
                      color: "var(--pd-ink)", fontSize: 13, fontFamily: "var(--pd-font-mono)",
                    }}/>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Strike zone picker */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
          <div className="pd-eyebrow">
            Tap to set location <span style={{ color: "var(--pd-ink-4)", fontWeight: 500, textTransform: "none", letterSpacing: 0 }}>· {pitchView === "pitcher" ? "pitcher's" : "catcher's"} view</span>
          </div>
          {onSetPitchView && (
            <div style={{ display: "flex", gap: 4 }}>
              {["pitcher", "catcher"].map(v => (
                <button key={v} onClick={() => onSetPitchView(v)} style={{
                  padding: "3px 10px", borderRadius: 6, border: "1.5px solid",
                  borderColor: pitchView === v ? "var(--pd-red)" : "var(--pd-line)",
                  background: pitchView === v ? "var(--pd-red)" : "var(--pd-bone)",
                  color: pitchView === v ? "#fff" : "var(--pd-ink-3)",
                  fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                }}>{v === "pitcher" ? "Pitcher" : "Catcher"}</button>
              ))}
            </div>
          )}
        </div>
        <div>
          <StrikeZone size={420} plateX={plateX} plateZ={plateZ}
            batter={batter} accent={ACCENT} view={pitchView}
            absZone={hitterProfile?.abs_zone ? { ...hitterProfile.abs_zone, label: `ABS zone — ${hitterProfile.height_display || ""}` } : null}
            onPick={(x, z) => { setPlateX(x); setPlateZ(z); }}/>
          <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
            <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 5 }}>
              <span style={{ fontFamily: "var(--pd-font-mono)", fontSize: 10, color: "var(--pd-ink-3)", whiteSpace: "nowrap" }}>
                plate_x ({pitchView === "pitcher" ? "P" : "C"})
              </span>
              <input type="number" step={0.05} min={-1.7} max={1.7}
                value={(pitchView === "pitcher" ? -plateX : plateX).toFixed(2)}
                onChange={e => { const v = parseFloat(e.target.value); if (!isNaN(v)) setPlateX(pitchView === "pitcher" ? -v : v); }}
                style={{ flex: 1, fontFamily: "var(--pd-font-mono)", fontSize: 12, padding: "3px 6px",
                  border: "1.5px solid var(--pd-line)", borderRadius: 8, background: "var(--pd-bone)", color: "var(--pd-ink)" }}/>
              <span style={{ fontFamily: "var(--pd-font-mono)", fontSize: 10, color: "var(--pd-ink-4)" }}>ft</span>
            </div>
            <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 5 }}>
              <span style={{ fontFamily: "var(--pd-font-mono)", fontSize: 10, color: "var(--pd-ink-3)", whiteSpace: "nowrap" }}>plate_z</span>
              <input type="number" step={0.05} min={0.7} max={4.3}
                value={plateZ.toFixed(2)}
                onChange={e => { const v = parseFloat(e.target.value); if (!isNaN(v)) setPlateZ(v); }}
                style={{ flex: 1, fontFamily: "var(--pd-font-mono)", fontSize: 12, padding: "3px 6px",
                  border: "1.5px solid var(--pd-line)", borderRadius: 8, background: "var(--pd-bone)", color: "var(--pd-ink)" }}/>
              <span style={{ fontFamily: "var(--pd-font-mono)", fontSize: 10, color: "var(--pd-ink-4)" }}>ft</span>
            </div>
          </div>
        </div>

        <button className="pd-btn pd-btn--primary" onClick={runPrediction} disabled={loading}
          style={{ marginTop: 18, width: "100%", fontSize: 16, padding: "16px 22px", opacity: loading ? 0.7 : 1 }}>
          {loading ? "Running…" : "Run prediction"}
          {!loading && <svg width="16" height="16" viewBox="0 0 16 16"><path d="M3 8h10m-4-4l4 4-4 4" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg>}
        </button>
      </div>

      {/* RIGHT — results */}
      <div className="pd-scroll" style={{ flex: 1, padding: "24px 28px", overflowY: "auto", background: "var(--pd-cream)" }}>
        <span className="pd-eyebrow">Step 2</span>
        <h2 className="pd-display" style={{ fontSize: 28, marginTop: 4, marginBottom: 18 }}>The verdict</h2>

        {error && (
          <div style={{ border: "1.5px solid var(--pd-bad-soft)", borderRadius: 14, padding: "16px 20px", color: "var(--pd-bad)", fontSize: 14, marginBottom: 16 }}>
            {error}
          </div>
        )}

        {!result && !error ? (
          <div style={{
            border: "2px dashed var(--pd-line)", borderRadius: 18, padding: "44px 24px", textAlign: "center",
            color: "var(--pd-ink-3)", fontSize: 14,
          }}>
            <div style={{ fontFamily: "var(--pd-font-display)", fontSize: 22, color: "var(--pd-ink-2)", marginBottom: 6 }}>
              Throw a pitch
            </div>
            Tap <em>Run prediction</em> to see how {displayName(hitter?.name) || "the hitter"} reacts.
          </div>
        ) : result ? (
          <>
            {/* Verdict badge */}
            <div className="pd-card" style={{ padding: 22, marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <span className="pd-eyebrow">Expected damage (per-pitch)</span>
                {danger && (
                  <span style={{
                    padding: "5px 12px", borderRadius: 999, fontSize: 11, fontWeight: 700, letterSpacing: "0.06em",
                    background: dangerBg, color: dangerColor,
                  }}>{danger}</span>
                )}
              </div>
              <div style={{ display: "flex", alignItems: "baseline", gap: 14 }}>
                <span style={{ fontFamily: "var(--pd-font-display)", fontSize: 64, lineHeight: 1, color: dangerColor || "var(--pd-ink)" }}>
                  {xwoba.predicted_xwoba_per_pitch != null ? Number(xwoba.predicted_xwoba_per_pitch).toFixed(3) : "—"}
                </span>
                <span style={{ fontSize: 13, color: "var(--pd-ink-3)" }}>
                  vs league avg per pitch <span style={{ fontFamily: "var(--pd-font-mono)", color: "var(--pd-ink-2)" }}>0.075</span>
                </span>
              </div>
            </div>

            {/* Stage bars */}
            <div className="pd-card" style={{ padding: 22, marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                <span className="pd-eyebrow">Three-stage pipeline</span>
                <span style={{ fontFamily: "var(--pd-font-mono)", fontSize: 10, color: "var(--pd-ink-3)", background: "var(--pd-line-2)", padding: "3px 8px", borderRadius: 6 }}>
                  {result?.model_version?.toUpperCase() || modelVersion.toUpperCase()}
                </span>
              </div>
              <StageBar label="P (Swing)"           value={blend.p_swing}   color="#2563EB"/>
              <StageBar label="P (Contact | Swing)" value={blend.p_contact} color={ACCENT}/>
              <StageBar label="P (Hard | Contact)"  value={blend.p_hard}    color="var(--pd-warn)"/>
            </div>

            {/* Feature drivers */}
            {drivers.length > 0 && (
              <div className="pd-card" style={{ padding: 22, marginBottom: 16 }}>
                <span className="pd-eyebrow" style={{ marginBottom: 12, display: "block" }}>Top drivers</span>
                {drivers.map((d, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                    <div style={{ width: 160, fontSize: 13, color: "var(--pd-ink-2)" }}>{d.feature || d.name}</div>
                    <div style={{ flex: 1, height: 6, background: "var(--pd-line-2)", borderRadius: 999, overflow: "hidden" }}>
                      <div style={{ width: `${Math.min(100, (d.importance || d.value || 0) * 400)}%`, height: "100%", background: "var(--pd-ink-2)" }}/>
                    </div>
                    <div style={{ fontFamily: "var(--pd-font-mono)", fontSize: 11, color: "var(--pd-ink-3)", width: 38, textAlign: "right" }}>
                      {((d.importance || d.value || 0) * 100).toFixed(1)}%
                    </div>
                  </div>
                ))}
              </div>
            )}

          </>
        ) : null}
      </div>
    </div>
  );
}
{% endraw %}
</script>

<!-- ═══════════════════════════════════════════════════════
     Block 7 — AtBatView (rolling /api/predict_demo per pitch)
     ═══════════════════════════════════════════════════════ -->
<script type="text/babel">
{% raw %}
function simulateOutcome(pSwing, pContact, pHard, px, pz) {
  if (Math.random() >= pSwing) {
    const inZone = Math.abs(px) < 0.85 && pz > 1.5 && pz < 3.5;
    return inZone ? "called_strike" : "ball";
  }
  if (Math.random() >= pContact) return "swinging_strike";
  if (Math.random() < pHard) return "hit_into_play";
  return "foul";
}

function advanceCount(outcome, balls, strikes) {
  if (outcome === "ball") {
    const b = balls + 1;
    return { balls: b, strikes, over: b >= 4, label: b >= 4 ? "BB" : null };
  }
  if (outcome === "called_strike" || outcome === "swinging_strike") {
    const s = strikes + 1;
    return { balls, strikes: s, over: s >= 3, label: s >= 3 ? "K" : null };
  }
  if (outcome === "foul") {
    return { balls, strikes: Math.min(strikes + 1, 2), over: false, label: null };
  }
  if (outcome === "hit_into_play") {
    return { balls, strikes, over: true, label: "In Play" };
  }
  return { balls, strikes, over: false, label: null };
}

function AtBatView({ hitter, hitterProfile, modelVersion = "v2", pitchView = "pitcher", onSetPitchView }) {
  const _d0ab = PITCH_DEFAULTS.FF;
  const [pitches,      setPitches]     = useState([]);
  const [balls,        setBalls]       = useState(0);
  const [strikes,      setStrikes]     = useState(0);
  const [atBatOver,    setAtBatOver]   = useState(false);
  const [atBatResult,  setAtBatResult] = useState(null);
  const [adding,       setAdding]      = useState(false);
  const [newType,      setNewType]     = useState("FF");
  const [newVelo,      setNewVelo]     = useState(94);
  const [newX,         setNewX]        = useState(0);
  const [newZ,         setNewZ]        = useState(2.5);
  const [error,        setError]       = useState(null);
  const [advOpen,      setAdvOpen]     = useState(false);
  const [abSpin,       setAbSpin]      = useState(_d0ab.spin);
  const [abPfxX,       setAbPfxX]      = useState(_d0ab.pfx_x);
  const [abPfxZ,       setAbPfxZ]      = useState(_d0ab.pfx_z);
  const [abRelX,       setAbRelX]      = useState(_d0ab.rel_x);
  const [abRelZ,       setAbRelZ]      = useState(_d0ab.rel_z);
  const [abExt,        setAbExt]       = useState(_d0ab.ext);

  const changeAbPitchType = (code) => {
    setNewType(code);
    const d = PITCH_DEFAULTS[code] || PITCH_DEFAULTS.FF;
    setAbSpin(d.spin); setAbPfxX(d.pfx_x); setAbPfxZ(d.pfx_z);
    setAbRelX(d.rel_x); setAbRelZ(d.rel_z); setAbExt(d.ext);
  };

  const batter = hitter?.stand || "R";

  const addPitch = async () => {
    if (!hitter || atBatOver) return;
    setAdding(true);
    setError(null);
    try {
      const res = await fetch("/api/predict_demo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          hitter_name:   hitter.name,
          model_version: modelVersion,
          pitch: {
            release_speed:     newVelo,
            plate_x:           newX,
            plate_z:           newZ,
            pitch_type:        newType,
            balls,
            strikes,
            spin_rate:         abSpin,
            pfx_x:             abPfxX,
            pfx_z:             abPfxZ,
            release_pos_x:     abRelX,
            release_pos_z:     abRelZ,
            release_extension: abExt,
            p_throws:          "R",
            pitch_number:      pitches.length + 1,
            on_1b: 0, on_2b: 0, on_3b: 0,
            inning: 1, score_diff: 0, times_through_order: 1,
          },
        }),
      });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const data = await res.json();
      const bl = data.blend || {};
      const result = simulateOutcome(bl.p_swing || 0, bl.p_contact || 0, bl.p_hard || 0, newX, newZ);
      const next   = advanceCount(result, balls, strikes);
      setPitches(prev => [...prev, {
        type: newType, velo: newVelo, x: newX, z: newZ,
        result,
        pSwing:   bl.p_swing   || 0,
        pContact: bl.p_contact || 0,
        pHard:    bl.p_hard    || 0,
        xwoba:    data.xwoba?.predicted_xwoba_per_pitch || 0,
      }]);
      setBalls(next.balls);
      setStrikes(next.strikes);
      if (next.over) { setAtBatOver(true); setAtBatResult(next.label); }
    } catch (e) {
      setError(e.message);
    } finally {
      setAdding(false);
    }
  };

  const avgSwing = pitches.length ? pitches.reduce((a, p) => a + p.pSwing, 0) / pitches.length : 0;
  const cumXwoba = pitches.length ? (pitches.reduce((a, p) => a + (p.xwoba || 0), 0) / pitches.length).toFixed(3) : "—";

  // Zone SVG (static, shows sequence) — render in current pitchView
  const zoneSvg = useMemo(() => {
    const sz = 260;
    const ftToS = (px, pz) => ({ x: ((px + 2.0) / 4.0) * sz, y: ((1 - (pz - 0.5) / 4.0)) * sz });
    const zTL = ftToS(-0.85, 3.5), zBR = ftToS(0.85, 1.5);
    let s = `<svg xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" style="background:#F0EBE3;border-radius:16px;">`;
    s += `<rect x="${zTL.x}" y="${zTL.y}" width="${zBR.x-zTL.x}" height="${zBR.y-zTL.y}" fill="rgba(255,255,255,0.6)" stroke="#15171C" stroke-width="2.5"/>`;
    for (let i = 1; i < 3; i++) {
      s += `<line x1="${zTL.x+(zBR.x-zTL.x)/3*i}" y1="${zTL.y}" x2="${zTL.x+(zBR.x-zTL.x)/3*i}" y2="${zBR.y}" stroke="#9AA0A8" stroke-opacity="0.4" stroke-width="1"/>`;
      s += `<line x1="${zTL.x}" y1="${zTL.y+(zBR.y-zTL.y)/3*i}" x2="${zBR.x}" y2="${zTL.y+(zBR.y-zTL.y)/3*i}" stroke="#9AA0A8" stroke-opacity="0.4" stroke-width="1"/>`;
    }
    pitches.forEach((p, i) => {
      // p.x is catcher's view; flip for pitcher's view display
      const displayX = pitchView === "pitcher" ? -p.x : p.x;
      const pos = ftToS(displayX, p.z);
      const col = ptColor(p.type);
      s += `<circle cx="${pos.x}" cy="${pos.y}" r="8" fill="${col}" stroke="#fff" stroke-width="1.5"/>`;
      s += `<text x="${pos.x}" y="${pos.y+4}" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" font-family="monospace">${i+1}</text>`;
    });
    s += "</svg>";
    return s;
  }, [pitches, pitchView]);

  const stepBtn = {
    padding: "6px 12px", borderRadius: 999, border: "none",
    background: "var(--pd-bone)", cursor: "pointer", fontFamily: "inherit", fontSize: 12, fontWeight: 600,
    color: "var(--pd-ink-2)", border: "1px solid var(--pd-line)",
  };

  return (
    <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
      {/* LEFT — pitch controls */}
      <div className="pd-scroll" style={{
        flex: "0 0 48%", padding: "24px 28px", overflowY: "auto",
        borderRight: "1px solid var(--pd-line)",
      }}>
        <div className="pd-card" style={{ padding: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div className="pd-eyebrow">Add next pitch</div>
            <div style={{
              display: "flex", alignItems: "center", gap: 8,
              padding: "6px 14px", borderRadius: 10,
              background: atBatOver ? "var(--pd-red)" : "var(--pd-ink)",
              color: "var(--pd-cream)",
            }}>
              <span style={{ fontSize: 9, letterSpacing: "0.1em", opacity: 0.6 }}>
                {atBatOver ? "RESULT" : "COUNT"}
              </span>
              <span style={{ fontFamily: "var(--pd-font-mono)", fontSize: 18, fontWeight: 700 }}>
                {atBatOver ? atBatResult : `${balls}–${strikes}`}
              </span>
            </div>
          </div>
          {error && (
            <div style={{ color: "var(--pd-bad)", fontSize: 13, marginBottom: 12, padding: "10px 14px", background: "var(--pd-bad-soft)", borderRadius: 10 }}>{error}</div>
          )}
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 12 }}>
            {PITCH_TYPES.map(p => {
              const active = newType === p.code;
              return (
                <button key={p.code} onClick={() => changeAbPitchType(p.code)} style={{
                  padding: "7px 13px", borderRadius: 999,
                  border: `1.5px solid ${active ? p.color : "var(--pd-line)"}`,
                  background: active ? p.color : "var(--pd-bone)",
                  color: active ? "#fff" : "var(--pd-ink-2)",
                  fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                  display: "flex", alignItems: "center", gap: 5,
                }}>
                  <span style={{ fontFamily: "var(--pd-font-mono)", fontSize: 10, opacity: 0.75 }}>{p.code}</span>

          <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 12 }}>
            <span style={{ fontSize: 12, color: "var(--pd-ink-3)", width: 38 }}>Velo</span>

              style={{ flex: 1, accentColor: ACCENT }}/>
            <input type="number" min={70} max={104} value={newVelo}
              onChange={e => setNewVelo(Math.max(70, Math.min(104, parseInt(e.target.value) || 70)))}
              style={{ fontFamily: "var(--pd-font-mono)", fontSize: 13, width: 60, textAlign: "right",
                border: "1.5px solid var(--pd-line)", borderRadius: 8, padding: "3px 6px",
                background: "var(--pd-bone)", color: "var(--pd-ink)" }}/>
            <span style={{ fontSize: 12, color: "var(--pd-ink-3)" }}>mph</span>
          </div>
          {/* Advanced inputs */}
          <div style={{ marginBottom: 12 }}>
            <button onClick={() => setAdvOpen(o => !o)} style={{
              display: "flex", alignItems: "center", gap: 8, width: "100%",
              background: "none", border: "1px dashed var(--pd-line)", borderRadius: 10,
              padding: "6px 12px", cursor: "pointer", color: "var(--pd-ink-3)",
              fontSize: 11, fontFamily: "inherit", fontWeight: 600,
            }}>
              <span style={{ fontSize: 14, lineHeight: 1 }}>{advOpen ? "−" : "+"}</span>
              Advanced pitch inputs
            </button>
            {advOpen && (
              <div style={{ marginTop: 8, display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8 }}>
                {[
                  { label: "Spin (rpm)", val: abSpin,  set: setAbSpin,  step: 10  },
                  { label: "pfx_x (ft)", val: abPfxX,  set: setAbPfxX,  step: 0.1 },
                  { label: "pfx_z (ft)", val: abPfxZ,  set: setAbPfxZ,  step: 0.1 },
                  { label: "Rel X (ft)", val: abRelX,  set: setAbRelX,  step: 0.1 },
                  { label: "Rel Z (ft)", val: abRelZ,  set: setAbRelZ,  step: 0.1 },
                  { label: "Ext (ft)",   val: abExt,   set: setAbExt,   step: 0.1 },
                ].map(f => (
                  <div key={f.label}>
                    <div style={{ fontSize: 10, color: "var(--pd-ink-3)", marginBottom: 3 }}>{f.label}</div>
                    <input type="number" value={f.val} step={f.step}
                      onChange={e => f.set(parseFloat(e.target.value) || 0)}
                      style={{
                        width: "100%", padding: "5px 7px", borderRadius: 8,
                        border: "1.5px solid var(--pd-line)", background: "var(--pd-bone)",
                        color: "var(--pd-ink)", fontSize: 12, fontFamily: "var(--pd-font-mono)",
                      }}/>
                  </div>
                ))}
              </div>
            )}
          </div>
          <div style={{ marginBottom: 12 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
              <div style={{ fontSize: 11, color: "var(--pd-ink-3)" }}>Location (tap to set · {pitchView === "pitcher" ? "pitcher's" : "catcher's"} view)</div>
              {onSetPitchView && (
                <div style={{ display: "flex", gap: 4 }}>
                  {["pitcher", "catcher"].map(v => (
                    <button key={v} onClick={() => onSetPitchView(v)} style={{
                      padding: "2px 8px", borderRadius: 6, border: "1.5px solid",
                      borderColor: pitchView === v ? "var(--pd-red)" : "var(--pd-line)",
                      background: pitchView === v ? "var(--pd-red)" : "var(--pd-bone)",
                      color: pitchView === v ? "#fff" : "var(--pd-ink-3)",
                      fontSize: 10, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                    }}>{v === "pitcher" ? "P" : "C"}</button>
                  ))}
                </div>
              )}
            </div>
            <StrikeZone size={420} plateX={newX} plateZ={newZ} batter={batter} accent={ACCENT} view={pitchView}
              absZone={hitterProfile?.abs_zone ? { ...hitterProfile.abs_zone, label: `ABS zone — ${hitterProfile.height_display || ""}` } : null}
              onPick={(x, z) => { setNewX(x); setNewZ(z); }}/>
            <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
              <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 5 }}>
                <span style={{ fontFamily: "var(--pd-font-mono)", fontSize: 10, color: "var(--pd-ink-3)", whiteSpace: "nowrap" }}>
                  plate_x ({pitchView === "pitcher" ? "P" : "C"})
                </span>
                <input type="number" step={0.05} min={-1.7} max={1.7}
                  value={(pitchView === "pitcher" ? -newX : newX).toFixed(2)}
                  onChange={e => { const v = parseFloat(e.target.value); if (!isNaN(v)) setNewX(pitchView === "pitcher" ? -v : v); }}
                  style={{ flex: 1, fontFamily: "var(--pd-font-mono)", fontSize: 12, padding: "3px 6px",
                    border: "1.5px solid var(--pd-line)", borderRadius: 8, background: "var(--pd-bone)", color: "var(--pd-ink)" }}/>
                <span style={{ fontFamily: "var(--pd-font-mono)", fontSize: 10, color: "var(--pd-ink-4)" }}>ft</span>
              </div>
              <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 5 }}>
                <span style={{ fontFamily: "var(--pd-font-mono)", fontSize: 10, color: "var(--pd-ink-3)", whiteSpace: "nowrap" }}>plate_z</span>
                <input type="number" step={0.05} min={0.7} max={4.3}
                  value={newZ.toFixed(2)}
                  onChange={e => { const v = parseFloat(e.target.value); if (!isNaN(v)) setNewZ(v); }}
                  style={{ flex: 1, fontFamily: "var(--pd-font-mono)", fontSize: 12, padding: "3px 6px",
                    border: "1.5px solid var(--pd-line)", borderRadius: 8, background: "var(--pd-bone)", color: "var(--pd-ink)" }}/>
                <span style={{ fontFamily: "var(--pd-font-mono)", fontSize: 10, color: "var(--pd-ink-4)" }}>ft</span>
              </div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={addPitch} disabled={adding || !hitter || atBatOver} className="pd-btn pd-btn--primary"
              style={{ flex: 1, fontSize: 14, padding: "12px 16px", opacity: (adding || !hitter || atBatOver) ? 0.7 : 1 }}>
              {adding ? "Predicting…" : atBatOver ? `At-bat over — ${atBatResult}` : "+ Add pitch"}
            </button>
            {pitches.length > 0 && (
              <button onClick={() => {
                setPitches([]); setBalls(0); setStrikes(0);
                setAtBatOver(false); setAtBatResult(null); setError(null);
              }} style={stepBtn}>Reset</button>
            )}
          </div>
        </div>
      </div>

      {/* RIGHT — zone + summary + sequence */}
      <div className="pd-scroll" style={{ flex: 1, padding: "24px 28px", overflowY: "auto", background: "var(--pd-cream)" }}>
        <span className="pd-eyebrow">Location</span>
        <h2 className="pd-display" style={{ fontSize: 22, marginTop: 4, marginBottom: 14 }}>Sequence on the zone</h2>
        <div dangerouslySetInnerHTML={{ __html: zoneSvg }}/>
        <div style={{ marginTop: 16, marginBottom: 14 }} className="pd-card">
          <div style={{ padding: 18 }}>
            <span className="pd-eyebrow">At-bat summary</span>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, marginTop: 12 }}>
              {[
                { l: "Pitches",       v: pitches.length || "—" },
                { l: "Avg P(swing)",  v: pitches.length ? Math.round(avgSwing * 100) + "%" : "—" },
                { l: "Avg xwOBA",    v: cumXwoba },
              ].map(s => (
                <div key={s.l}>
                  <div style={{ fontFamily: "var(--pd-font-mono)", fontSize: 22, fontWeight: 700, color: "var(--pd-ink)" }}>{s.v}</div>
                  <div style={{ fontSize: 10, color: "var(--pd-ink-3)", letterSpacing: "0.04em" }}>{s.l.toUpperCase()}</div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {pitches.length === 0 ? (
          <div style={{ textAlign: "center", padding: "20px 0", color: "var(--pd-ink-3)", fontSize: 13 }}>
            No pitches yet. Configure and throw one on the left.
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {pitches.map((p, i) => {
              const col = ptColor(p.type);
              return (
                <div key={i} className="pd-card" style={{ padding: 14, display: "flex", alignItems: "center", gap: 14 }}>
                  <div style={{
                    width: 34, height: 34, borderRadius: 999, background: col,
                    color: "#fff", display: "flex", alignItems: "center", justifyContent: "center",
                    fontWeight: 700, fontSize: 13, fontFamily: "var(--pd-font-mono)", flexShrink: 0,
                  }}>{i+1}</div>
                  <div style={{ width: 60 }}>
                    <div style={{ fontSize: 14, fontWeight: 600 }}>{p.type}</div>
                    <div style={{ fontSize: 11, color: "var(--pd-ink-3)", fontFamily: "var(--pd-font-mono)" }}>{p.velo} mph</div>
                  </div>
                  <div style={{ flex: 1, display: "flex", gap: 14 }}>
                    {[
                      { l: "SW",   v: p.pSwing,   c: "#2563EB" },
                      { l: "CT",   v: p.pContact, c: ACCENT    },
                      { l: "HARD", v: p.pHard,    c: "var(--pd-warn)" },
                    ].map(s => (
                      <div key={s.l} style={{ flex: 1 }}>
                        <div style={{ fontSize: 9, color: "var(--pd-ink-3)", fontWeight: 600, letterSpacing: "0.06em" }}>{s.l}</div>
                        <div style={{ height: 4, background: "var(--pd-line-2)", borderRadius: 999, marginTop: 4 }}>
                          <div style={{ width: `${Math.round(s.v*100)}%`, height: "100%", background: s.c, borderRadius: 999 }}/>
                        </div>
                        <div style={{ fontFamily: "var(--pd-font-mono)", fontSize: 10, color: s.c, marginTop: 3, fontWeight: 700 }}>{Math.round(s.v*100)}%</div>
                      </div>
                    ))}
                  </div>
                  <span className="pd-pill" style={{ fontSize: 10 }}>{p.result.replace(/_/g, " ")}</span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}
{% endraw %}
</script>

<!-- ═══════════════════════════════════════════════════════
     Block 8 — GameLogView (wired to /game_log)
     ═══════════════════════════════════════════════════════ -->
<script type="text/babel">
{% raw %}
function GameLogView({ hitter }) {
  const [logData,  setLogData]  = useState(null);
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState(null);
  const fileRef = useRef(null);

  const upload = async (file) => {
    if (!file) return;
    setLoading(true);
    setError(null);
    setLogData(null);
    const fd = new FormData();
    fd.append("file", file);
    if (hitter) fd.append("hitter_name", hitter.name);
    try {
      const res = await fetch("/game_log", { method: "POST", body: fd });
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(txt.slice(0, 200));
      }
      setLogData(await res.json());
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  const summary       = logData?.summary || {};
  const ptBreakdown   = logData?.pitch_type_breakdown || [];

  return (
    <div className="pd-scroll" style={{ padding: "26px 32px", overflowY: "auto", flex: 1 }}>
      <span className="pd-eyebrow">Bulk evaluation</span>
      <h2 className="pd-display" style={{ fontSize: 32, marginTop: 4, marginBottom: 6 }}>Hitter game log</h2>
      <p style={{ fontSize: 14, color: "var(--pd-ink-3)", marginBottom: 20, maxWidth: 640 }}>
        Upload a Baseball Savant or Trackman CSV of all pitches thrown to a hitter. The model runs the full
        pipeline on every pitch and surfaces patterns across the session.
      </p>

      {!logData && !loading ? (
        <div style={{
          border: "2px dashed var(--pd-line)", borderRadius: 20, padding: "44px 24px",
          textAlign: "center", background: "var(--pd-bone)",
        }}>
          <div style={{
            width: 56, height: 56, borderRadius: 16, background: "var(--pd-red-soft)", color: ACCENT,
            display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 12,
          }}>
            <svg width="26" height="26" viewBox="0 0 24 24">
              <path d="M12 16V4m0 0l-4 4m4-4l4 4M5 20h14" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
            </svg>
          </div>
          <div style={{ fontFamily: "var(--pd-font-display)", fontSize: 22, marginBottom: 6 }}>Drop a CSV here</div>
          <div style={{ fontSize: 13, color: "var(--pd-ink-3)", marginBottom: 16 }}>
            Trackman or Baseball Savant export · up to 5,000 pitches
          </div>
          {error && <div style={{ color: "var(--pd-bad)", fontSize: 13, marginBottom: 14 }}>{error}</div>}
          <input ref={fileRef} type="file" accept=".csv" style={{ display: "none" }}
            onChange={e => upload(e.target.files[0])}/>
          <button onClick={() => fileRef.current?.click()} className="pd-btn pd-btn--primary">Choose file</button>
        </div>
      ) : loading ? (
        <div style={{ textAlign: "center", padding: "40px", color: "var(--pd-ink-3)", fontSize: 14 }}>
          <div style={{ fontFamily: "var(--pd-font-display)", fontSize: 22, marginBottom: 8 }}>Analyzing…</div>
          Running full pipeline on every pitch. This may take a moment.
        </div>
      ) : logData ? (
        <>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 16 }}>
            {[
              { l: "Pitches",           v: summary.n_pitches   ?? "—" },
              { l: "Plate appearances", v: summary.n_pas       ?? "—" },
              { l: "Avg P(hard)",       v: summary.mean_p_hard != null ? (summary.mean_p_hard * 100).toFixed(1) + "%" : "—", c: ACCENT },
              { l: "Hitter",            v: displayName(summary.hitter || hitter?.name || "—") },
            ].map(s => (
              <div key={s.l} className="pd-card" style={{ padding: 16 }}>
                <div style={{ fontSize: 11, color: "var(--pd-ink-3)", letterSpacing: "0.04em", fontWeight: 600 }}>{s.l.toUpperCase()}</div>
                <div style={{ fontFamily: "var(--pd-font-mono)", fontSize: 22, fontWeight: 700, marginTop: 4, color: s.c || "var(--pd-ink)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{s.v}</div>
              </div>
            ))}
          </div>

          {ptBreakdown.length > 0 && (
            <div className="pd-card" style={{ padding: 18, marginBottom: 16 }}>
              <span className="pd-eyebrow">Outcomes by pitch type</span>
              <div style={{ marginTop: 12 }}>
                {ptBreakdown.map(r => {
                  const col = ptColor(r.pitch_type);
                  return (
                    <div key={r.pitch_type} style={{
                      display: "flex", alignItems: "center", gap: 12,
                      padding: "10px 0", borderBottom: "1px solid var(--pd-line)",
                    }}>
                      <span style={{
                        width: 40, padding: "4px 0", borderRadius: 8, background: col, color: "#fff",
                        textAlign: "center", fontFamily: "var(--pd-font-mono)", fontSize: 12, fontWeight: 700,
                      }}>{r.pitch_type}</span>
                      <span style={{ width: 68, fontSize: 12, color: "var(--pd-ink-3)" }}>n = {r.count}</span>
                      <div style={{ flex: 1, display: "flex", gap: 8 }}>
                        {[
                          { v: r.mean_p_swing   || 0, c: "#2563EB" },
                          { v: r.mean_p_contact || 0, c: ACCENT    },
                          { v: r.mean_p_hard    || 0, c: "var(--pd-warn)" },
                        ].map((s, i) => (
                          <div key={i} style={{ flex: 1, height: 18, background: "var(--pd-line-2)", borderRadius: 4, position: "relative", overflow: "hidden" }}>
                            <div style={{ width: `${(s.v * 100).toFixed(0)}%`, height: "100%", background: s.c }}/>
                            <span style={{ position: "absolute", top: 0, left: 6, fontSize: 10, fontFamily: "var(--pd-font-mono)", color: "#fff", lineHeight: "18px", fontWeight: 700, mixBlendMode: "difference" }}>
                              {Math.round(s.v * 100)}%
                            </span>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{ display: "flex", gap: 16, marginTop: 10, fontSize: 11, color: "var(--pd-ink-3)" }}>
                {[{ c: "#2563EB", l: "P(swing)" }, { c: ACCENT, l: "P(contact)" }, { c: "var(--pd-warn)", l: "P(hard)" }].map(x => (
                  <span key={x.l} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                    <span style={{ width: 10, height: 10, borderRadius: 2, background: x.c, display: "inline-block" }}/>
                    {x.l}
                  </span>
                ))}
              </div>
            </div>
          )}

          {error && <div style={{ color: "var(--pd-bad)", fontSize: 13, marginBottom: 14 }}>{error}</div>}
          <button onClick={() => { setLogData(null); setError(null); }} className="pd-btn pd-btn--ghost">
            Upload different CSV
          </button>
        </>
      ) : null}
    </div>
  );
}
{% endraw %}
</script>

<script type="text/babel">

function DbgRow({ label, value, note, highlight }) {

}

function DbgSection({ title, color, children }) {
  return (
    <div style={{ marginBottom: 20 }}>
      <div style={{
        fontSize: 10, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase",
        color: color || "var(--pd-ink-3)", marginBottom: 6, paddingBottom: 4,
        borderBottom: `2px solid ${color || "var(--pd-line)"}`,
      }}>{title}</div>
      {children}
